<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Local Overrides</h1>

    <div id="not-pages" class="notice" hidden>
      <p>Navigate to <strong>pages.sitecorecloud.io</strong> to use this extension.</p>
    </div>

    <div id="controls">
      <!-- Local CM Content -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">Content (CM)</span>
          <div class="toggle-row">
            <label class="switch">
              <input type="checkbox" id="cm-toggle">
              <span class="slider"></span>
            </label>
            <span id="cm-status" class="status-label">Off</span>
          </div>
        </div>
        <div class="url-field">
          <input type="text" id="cm-url" placeholder="https://local.cm.mcc.mayo.edu/">
        </div>
      </section>

      <!-- Local Rendering Host -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">Rendering Host</span>
          <div class="toggle-row">
            <label class="switch">
              <input type="checkbox" id="rh-toggle">
              <span class="slider"></span>
            </label>
            <span id="rh-status" class="status-label">Off</span>
          </div>
        </div>
        <div class="url-field">
          <input type="text" id="rh-url" placeholder="https://local.mcc.mayo.edu">
        </div>
      </section>

      <button id="save-btn" class="btn-save">Save URLs</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
